<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa com Leaflet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <style>
    #map { height: 100%; width: 100%; }
    body, html { margin: 0; height: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

  <script>
    // Função para pegar parâmetros da URL
    function getParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // Origem e destino vindos da query string
    const origemLat = parseFloat(getParam("origemLat"));
    const origemLng = parseFloat(getParam("origemLng"));
    const destinoLat = parseFloat(getParam("destinoLat"));
    const destinoLng = parseFloat(getParam("destinoLng"));

    var map = L.map('map').setView([origemLat, origemLng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    L.Routing.control({
      waypoints: [
        L.latLng(origemLat, origemLng),
        L.latLng(destinoLat, destinoLng)
      ],
      routeWhileDragging: true
    }).addTo(map);
  </script>
</body>
</html>
